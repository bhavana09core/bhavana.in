<!DOCTYPE html>
<html>
<head>
  <title>Bhavana Portfolio</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0a0a0a;
      color:white;
    }

    /* MAIN LAYOUT */
    .main{
      display:flex;
      min-height:100vh;
    }

    /* LEFT PANEL (ZOOMED + CENTERED CONTENT) */
    .left{
      width:45%;
      height:100vh;
      display:flex;
      align-items:center;        /* vertical centering */
      justify-content:center;    /* horizontal centering */
      padding:40px;

      background:
        radial-gradient(circle at 15% 85%, rgba(0,140,255,0.55), transparent 40%),
        radial-gradient(circle at 75% 15%, rgba(170,0,255,0.5), transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 60%),
        #0a0a0a;
    }

    /* INNER BLOCK TO CONTROL POSITION */
    .intro{
      max-width:520px;
      text-align:left;
      transform:translateX(40px); /* moves content slightly toward center */
    }

    .intro h1{
      font-size:72px;      /* zoomed text */
      margin:10px 0;
      letter-spacing:1px;
    }

    .intro h3{
      color:#66cfff;
      margin:6px 0;
      font-size:24px;
    }

    .intro p{
      color:#d0d0d0;
      line-height:1.7;
      font-size:19px;
      margin-top:15px;
    }

    .profile{
      margin-top:30px;
      display:flex;
      justify-content:center;
    }

    .profile img{
      width:320px;     /* zoomed image */
      border-radius:14px;
      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    /* RIGHT SIDE CONTENT */
    .right{
      width:55%;
      padding:90px 100px;
      background:#070710;
    }

    .section{
      margin-bottom:70px;
      max-width:820px;
    }

    .section h2{
      color:#66cfff;
      margin-bottom:15px;
      font-size:34px;
    }

    .section p{
      line-height:1.8;
      color:#cfcfcf;
      font-size:18px;
    }

    .skills{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:15px;
    }

    .skill{
      background:#111122;
      padding:12px 18px;
      border-radius:10px;
      font-size:16px;
    }
  </style>
</head>

<body>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="intro">
      <h3>Hello !!!</h3>
      <h1>I'm Bhavana</h1>
      <h3>Electronics & Communication Engineering Student</h3>

      <p>
        A rising junior passionate about antenna design, microwave theory,
        and communication systems. Focused on simulation, programming,
        and real-world implementation.
      </p>

      <div class="profile">
        <img src="bavna.png">
      </div>
    </div>
  </div>
