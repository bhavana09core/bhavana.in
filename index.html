<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
  overflow: hidden;
}

/* ANIMATED BACKGROUND */
.hero {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 60px 100px;
  box-sizing: border-box;
  position: relative;
  background: linear-gradient(270deg, #000000, #0a0a1f, #140033, #001f3f);
  background-size: 600% 600%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* LEFT SIDE */
.left {
  max-width: 700px;
  z-index: 2;
}

.left h1 {
  font-size: 75px;
  margin: 10px 0;
  background: linear-gradient(90deg, #00bfff, #a020f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px #00bfff;}
  to {text-shadow: 0 0 25px #a020f0;}
}

.left h3 {
  color: #a5cfff;
  letter-spacing: 2px;
}

.left p {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.7;
  color: #d6d6ff;
}

/* IMAGE FLOAT EFFECT */
.right img {
  height: 720px;
  border-radius: 20px;
  filter: grayscale(100%);
  box-shadow: 0 0 50px rgba(0,140,255,0.4),
              0 0 90px rgba(150,0,255,0.3);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0% {transform: translateY(0px);}
  50% {transform: translateY(-15px);}
  100% {transform: translateY(0px);}
}

/* NAVBAR */
.nav {
  position: absolute;
  top: 30px;
  left: 100px;
  right: 100px;
  display: flex;
  justify-content: space-between;
  font-size: 15px;
  z-index: 3;
}

.nav span {
  margin-right: 30px;
  cursor: pointer;
  color: #cfcfff;
  transition: 0.3s;
}

.nav span:hover {
  color: #00bfff;
  text-shadow: 0 0 10px #00bfff;
}
</style>
